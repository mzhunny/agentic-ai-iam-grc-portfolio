<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="Skills overview graphic">
  <rect width="1200" height="320" rx="18" fill="#071729"/>
  <text x="600" y="52" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="800" fill="#f8fafc">SKILLS <tspan fill="#22d3ee">OVERVIEW</tspan></text>
  <text x="600" y="86" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#d2e5f7">Identity • Risk • Compliance • Audit • Responsible AI</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <g transform="translate(34 118)"><rect width="270" height="150" rx="18" fill="#0b1d33" stroke="#22d3ee"/><text x="135" y="48" text-anchor="middle" font-size="20" font-weight="700" fill="#f8fafc">IAM/RBAC Validation</text><line x1="88" y1="60" x2="182" y2="60" stroke="#22d3ee" stroke-width="3"/><text x="135" y="96" text-anchor="middle" font-size="14" fill="#d7e5f4">Access reviews, least privilege,</text><text x="135" y="116" text-anchor="middle" font-size="14" fill="#d7e5f4">role validation, and control testing.</text></g>
    <g transform="translate(322 118)"><rect width="270" height="150" rx="18" fill="#0b1d33" stroke="#38bdf8"/><text x="135" y="48" text-anchor="middle" font-size="20" font-weight="700" fill="#f8fafc">SoD Conflict Detection</text><line x1="82" y1="60" x2="188" y2="60" stroke="#38bdf8" stroke-width="3"/><text x="135" y="96" text-anchor="middle" font-size="14" fill="#d7e5f4">Identify segregation-of-duties</text><text x="135" y="116" text-anchor="middle" font-size="14" fill="#d7e5f4">gaps, risks, and remediation paths.</text></g>
    <g transform="translate(610 118)"><rect width="270" height="150" rx="18" fill="#0b1d33" stroke="#60a5fa"/><text x="135" y="48" text-anchor="middle" font-size="20" font-weight="700" fill="#f8fafc">GRC Policy Mapping</text><line x1="84" y1="60" x2="186" y2="60" stroke="#60a5fa" stroke-width="3"/><text x="135" y="96" text-anchor="middle" font-size="14" fill="#d7e5f4">Map controls to frameworks,</text><text x="135" y="116" text-anchor="middle" font-size="14" fill="#d7e5f4">evidence expectations, and gaps.</text></g>
    <g transform="translate(898 118)"><rect width="270" height="150" rx="18" fill="#0b1d33" stroke="#8b5cf6"/><text x="135" y="48" text-anchor="middle" font-size="20" font-weight="700" fill="#f8fafc">Audit &amp; AI Governance</text><line x1="82" y1="60" x2="188" y2="60" stroke="#8b5cf6" stroke-width="3"/><text x="135" y="96" text-anchor="middle" font-size="14" fill="#d7e5f4">Validate evidence, preserve</text><text x="135" y="116" text-anchor="middle" font-size="14" fill="#d7e5f4">human approval, and govern AI safely.</text></g>
