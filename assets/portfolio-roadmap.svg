    <g transform="translate(250 200)"><text x="0" y="0" font-size="24" fill="#22d3ee">→</text></g>
    <g transform="translate(278 122)"><rect width="210" height="164" rx="18" fill="#0b1d33" stroke="#38bdf8"/><text x="16" y="38" font-size="28" font-weight="800" fill="#38bdf8">2</text><text x="50" y="34" font-size="18" font-weight="700" fill="#f8fafc">SoD Conflict</text><text x="50" y="56" font-size="18" font-weight="700" fill="#f8fafc">Detection Agent</text><text x="16" y="94">Segregation-of-duties</text><text x="16" y="112">conflict identification,</text><text x="16" y="130">risk ratings, remediation.</text></g>
