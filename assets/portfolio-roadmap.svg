    <g transform="translate(536 122)"><rect width="210" height="164" rx="18" fill="#0b1d33" stroke="#60a5fa"/><text x="16" y="38" font-size="28" font-weight="800" fill="#60a5fa">3</text><text x="50" y="34" font-size="18" font-weight="700" fill="#f8fafc">GRC Policy</text><text x="50" y="56" font-size="18" font-weight="700" fill="#f8fafc">Mapping Agent</text><text x="16" y="94">Policy-to-control mapping,</text><text x="16" y="112">gap analysis, and</text><text x="16" y="130">coverage review.</text></g>
    <g transform="translate(766 200)"><text x="0" y="0" font-size="24" fill="#8b5cf6">→</text></g>
